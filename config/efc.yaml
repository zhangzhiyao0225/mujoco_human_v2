    l_hip_r: 1
    l_hip_y: 1
    l_knee: 1
    l_ankle_l: 1
    l_ankle_s: 1
    r_hip_p: 1
    r_hip_r: 1
    r_hip_y: 1
    r_knee: 1
    r_ankle_l: 1
    r_ankle_s: 1
    waist_y: 1
    l_shoulder_p: 1
