  observer:
    log_data: 2
    log_dir: "/home/huahui/zzy/robot_control/mujoco_human_v2/log/extra"
    motor_pos_filter:
      type: "PassThrough"
      lower_bound: [ 
                     -3.14, -3.14, -3.14, -3.14, -3.14, -3.14,
                     -3.14, -3.14, -3.14, -3.14, -3.14, -3.14,
                     -3.14,
                     -3.14, -3.14, -3.14, -3.14, -3.14,
                     -3.14, -3.14, -3.14, -3.14, -3.14,
                     -3.14,
                   ]
      upper_bound: [
                     3.14, 3.14, 3.14, 3.14, 3.14, 3.14,
                     3.14, 3.14, 3.14, 3.14, 3.14, 3.14,
                     3.14,
                     3.14, 3.14, 3.14, 3.14, 3.14,
                     3.14, 3.14, 3.14, 3.14, 3.14,
                     3.14,
                   ]
    motor_vel_filter:
      type: "Mean"
      history_length: 3
      lower_bound: [
                     -50, -50, -50, -50, -50, -50,
                     -50, -50, -50, -50, -50, -50,
                     -50,
                     -50, -50, -50, -50, -50,
                     -50, -50, -50, -50, -50,
                     -50,
                   ]
      upper_bound: [
                     50, 50, 50, 50, 50, 50,
                     50, 50, 50, 50, 50, 50,
                     50,
                     50, 50, 50, 50, 50,
                     50, 50, 50, 50, 50,
                     50,
                   ]
    ang_vel_filter:
      type: "PassThrough"
      upper_bound: [100.0, 100.0, 100.0]
      lower_bound: [-100.0, -100.0, -100.0]
    acc_filter:
      type: "PassThrough"
      upper_bound: [100.0, 100.0, 100.0]
      lower_bound: [-100.0, -100.0, -100.0]
    euler_filter:
      type: "PassThrough"
      upper_bound: [100.0, 100.0, 100.0]
      lower_bound: [-100.0, -100.0, -100.0]

  executor:
    torque_limit:  # Nm
      l_hip_p: 500
      l_hip_r: 500
      l_hip_y: 500
      l_knee: 500
      l_ankle_l: 500
      l_ankle_s: 500
      r_hip_p: 500
      r_hip_r: 500
      r_hip_y: 500
      r_knee: 500
      r_ankle_l: 500
      r_ankle_s: 500
      waist_y: 500
      l_shoulder_p: 500
      l_shoulder_r: 500
      l_shoulder_y: 500
      l_elbow_p: 500
      l_elbow_y: 500
      r_shoulder_p: 500
      r_shoulder_r: 500
      r_shoulder_y: 500
      r_elbow_p: 500
      r_elbow_y: 500
      head_y: 500
    motor_upper_limit:  # rad
      l_hip_p: 3.14
      l_hip_r: 3.14
      l_hip_y: 3.14
      l_knee: 3.14
      l_ankle_l: 3.14
      l_ankle_s: 3.14
      r_hip_p: 3.14
      r_hip_r: 3.14
      r_hip_y: 3.14
      r_knee: 3.14
      r_ankle_l: 3.14
      r_ankle_s: 3.14
      waist_y: 3.14
      l_shoulder_p: 3.14
      l_shoulder_r: 3.14
      l_shoulder_y: 3.14
      l_elbow_p: 3.14
      l_elbow_y: 3.14
      r_shoulder_p: 3.14
      r_shoulder_r: 3.14
      r_shoulder_y: 3.14
      r_elbow_p: 3.14
      r_elbow_y: 3.14
      head_y: 3.14
    motor_lower_limit:  # rad
      l_hip_p: -3.14
      l_hip_r: -3.14
      l_hip_y: -3.14
      l_knee: -3.14
      l_ankle_l: -3.14
      l_ankle_s: -3.14
      r_hip_p: -3.14
      r_hip_r: -3.14
      r_hip_y: -3.14
      r_knee: -3.14
      r_ankle_l: -3.14
      r_ankle_s: -3.14
      waist_y: -3.14
      l_shoulder_p: -3.14
      l_shoulder_r: -3.14
      l_shoulder_y: -3.14
      l_elbow_p: -3.14
      l_elbow_y: -3.14
      r_shoulder_p: -3.14
      r_shoulder_r: -3.14
      r_shoulder_y: -3.14
      r_elbow_p: -3.14
      r_elbow_y: -3.14
      head_y: -3.14

  init_pos:
    duration: 1.5
    init_position: &defult_init_pos
      l_hip_p: -0.3
      l_hip_r: 0
      l_hip_y: 0
      l_knee: 0.6
      l_ankle_p: -0.3
      l_ankle_r: 0
      r_hip_p: -0.3
      r_hip_r: 0
      r_hip_y: 0
      r_knee: 0.6
      r_ankle_p: -0.3
      r_ankle_r: 0
      waist_y: 0
      l_shoulder_p: 0.3
      l_shoulder_r: 0.1
      l_shoulder_y: 0
      l_elbow_p: -0.8
      l_elbow_y: 0
      r_shoulder_p: 0.3
      r_shoulder_r: -0.1
      r_shoulder_y: 0
      r_elbow_p: -0.8
