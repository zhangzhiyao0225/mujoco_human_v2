    d_gains: &default_d_gains
      l_hip_p: 3
      l_hip_r: 3
      l_hip_y: 3
      l_knee: 3
      l_ankle_p: 2
      l_ankle_r: 2
      r_hip_p: 3
      r_hip_r: 3
      r_hip_y: 3
      r_knee: 3
      r_ankle_p: 2
      r_ankle_r: 2
      waist_y: 3
      l_shoulder_p: 2.0
      l_shoulder_r: 2.0
      l_shoulder_y: 2.0
      l_elbow_p: 2.0
      l_elbow_y: 2.0
      r_shoulder_p: 2.0
      r_shoulder_r: 2.0
      r_shoulder_y: 2.0
      r_elbow_p: 2.0
      r_elbow_y: 2.0
      head_y: 2.0

  zero_pos:
    duration: 1.0
    init_position: *defult_init_pos
    p_gains: *default_p_gains
    d_gains: *default_d_gains

  traditional_wave:
    controller_type: "WAVE_GREETING"
    p_gains: *default_p_gains
    d_gains: *default_d_gains
    default_position: *defult_init_pos
    raise_duration: 2.6          # 抬手过渡时间，越大抬手越慢
    wave_duration: 4.0           # 抬手后保持时间；当前版本不摆手，只保持姿态
    lower_duration: 2.8          # 收手过渡时间，越大回收越慢
    wave_frequency: 1.0          # 挥手频率，越大摆得越快
    shoulder_pitch_offset: -0.40 # 右肩前后抬手偏移，方向不对就改符号
    shoulder_roll_offset: -0.20 # 右肩外扩幅度，太大会整条手臂横出去
    elbow_pitch_offset: -1.8    # 右肘弯曲程度；负方向更像屈肘，别太接近限位
    shoulder_yaw_amplitude: 0.06  # 肩部摆手幅度，调小减少上身扰动
    elbow_yaw_offset: 0.90      # 小臂/手掌朝向偏置，手掌朝内就调这个
    elbow_yaw_amplitude: -0.04     # 肘 yaw 摆手幅度，调小避免动作太猛

  traditional_handshake:
    controller_type: "HANDSHAKE"
    p_gains: *default_p_gains
    d_gains: *default_d_gains
    default_position: *defult_init_pos
    reach_duration: 2.0          # 伸手过渡时间
    hold_duration: 4.0           # 伸出后保持时间
    return_duration: 2.0         # 收手过渡时间
    shake_frequency: 1.0         # 小幅上下握手频率
    shake_amplitude: 0.15        # 小幅上下握手幅度；设 0 就只伸手不晃
    shoulder_pitch_offset: -0.85 # 右肩向前伸手偏移，方向不对就改符号
    shoulder_roll_offset: -0.12  # 右肩轻微外扩，太大会像侧举
    shoulder_yaw_offset: 0.20    # 右肩朝身体前方转一点
    elbow_pitch_offset: -0.15    # 右肘微弯，避免完全伸直太僵
    elbow_yaw_offset: -0.35       # 小臂/手掌朝向偏置

  policy_standing:
    controller_type: "AUTO"
    p_gains: *default_p_gains
    d_gains: *default_d_gains
    default_position: *defult_init_pos
    decimation: 5
    target_pos_filter: &default_target_pos_filter
      type: "LowPass"
      upper_bound: [
                    50, 50, 50, 50, 50, 50,
                    50, 50, 50, 50, 50, 50, 
                    50,
                    50, 50, 50, 50, 50,
                    50, 50, 50, 50, 50,
                    50,
                   ]
      lower_bound: [
                    -50, -50, -50, -50, -50, -50,
                    -50, -50, -50, -50, -50, -50, 
                    -50,
                    -50, -50, -50, -50, -50,
                    -50, -50, -50, -50, -50,
                    -50,
                   ]
      alpha: [
              0.8, 0.8, 0.8, 0.8, 0.8, 0.8,
              0.8, 0.8, 0.8, 0.8, 0.8, 0.8, 
              0.8,
              0.8, 0.8, 0.8, 0.8, 0.8,
              0.8, 0.8, 0.8, 0.8, 0.8,
              0.8,
             ]

    inference:
      policy_type: "HumanoidStand"
      use_absolute_clock: true
      control_period: 0.01
      stand_threshold: 0.045
      model_path: "/home/huahui/zzy/robot_control/mujoco_human_v2/checkpoint/efc/beta_13dof_3dv2.onnx"
      # model_path: "/home/huahui/zzy/robot_control/mujoco_human_v2/checkpoint/efc/beta_13dof_large_d.onnx"
      # model_path: "/home/huahui/zzy/robot_control/mujoco_human_v2/checkpoint/efc/beta_13dof_120p.onnx"
      obs_buffer_size: 15

      log_data: 2
      log_dir: "/home/huahui/zzy/robot_control/mujoco_human_v2/log/policy"
      log_name: "standing"

      device: "CPU"
      cycle_time: 0.90
      single_obs_size: 50
      action_size: 13
      action_scale: 0.25
      obs_scales:
        ang_vel: 1.0
        lin_vel: 2.0
        command: 1.0
        dof_pos: 1.0
        dof_vel: 0.05
        proj_gravity: 1.0
      clip_action: 18.0
      realtime: false 
      stick_to_core: 5

      policy_joint_names: &default_policy_joint_names
        - "l_hip_p"
        - "l_hip_r"
        - "l_hip_y"
        - "l_knee"
        - "l_ankle_p"
        - "l_ankle_r"
        - "r_hip_p"
        - "r_hip_r"
        - "r_hip_y"
        - "r_knee"
        - "r_ankle_p"
        - "r_ankle_r"
        - "waist_y"
      policy_default_position: &default_policy_default_position
        l_hip_p: -0.3
        l_hip_r: 0.0
        l_hip_y: 0.0
        l_knee: 0.6
        l_ankle_p: -0.3
        l_ankle_r: 0.0
        r_hip_p: -0.3
        r_hip_r: 0.0
        r_hip_y: 0.0
        r_knee: 0.6
        r_ankle_p: -0.3
        r_ankle_r: 0.0
        waist_y: 0.0

  policy_walking:
    controller_type: "AUTO"
    p_gains: *default_p_gains
    d_gains: *default_d_gains
    default_position: *defult_init_pos
    decimation: 5
    target_pos_filter: *default_target_pos_filter

    inference:
      policy_type: "Epsilon"
      use_absolute_clock: true
      control_period: 0.01
      model_path: "/home/huahui/zzy/robot_control/mujoco_human_v2/checkpoint/efc/theta_3d_v44.onnx"

      obs_buffer_size: 15

      log_data: 2
      log_dir: "/home/huahui/zzy/robot_control/mujoco_human_v2/log/policy"
      log_name: "walking"

      device: "CPU"
      single_obs_size: 72
      action_size: 21
      action_scale: 0.25
      obs_scales:
        ang_vel: 1.0
        lin_vel: 2.0
        command: 1.0
        dof_pos: 1.0
        dof_vel: 0.05
        proj_gravity: 1.0
      clip_action: 18.0
      realtime: false
      stick_to_core: 6

      policy_joint_names:
        - "l_hip_p"
        - "l_hip_r"
        - "l_hip_y"
        - "l_knee"
        - "l_ankle_p"
        - "l_ankle_r"
        - "r_hip_p"
        - "r_hip_r"
        - "r_hip_y"
        - "r_knee"
        - "r_ankle_p"
        - "r_ankle_r"
        - "waist_y"
        - "l_shoulder_p"
        - "l_shoulder_r"
        - "l_shoulder_y"
        - "l_elbow_p"
        - "r_shoulder_p"
        - "r_shoulder_r"
        - "r_shoulder_y"
        - "r_elbow_p"
      policy_default_position:
        l_hip_p: -0.15
        l_hip_r: 0
        l_hip_y: 0
        l_knee: 0.3
        l_ankle_p: -0.15
        l_ankle_r: 0
        r_hip_p: -0.15
        r_hip_r: 0
        r_hip_y: 0
        r_knee: 0.3
        r_ankle_p: -0.15
        r_ankle_r: 0
        waist_y: 0
        l_shoulder_p: 0.3
        l_shoulder_r: 0.1
        l_shoulder_y: 0
        l_elbow_p: -0.8
        l_elbow_y: 0
        r_shoulder_p: 0.3
        r_shoulder_r: -0.1
        r_shoulder_y: 0
        r_elbow_p: -0.8
        r_elbow_y: 0
        head_y: 0

